<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 페이지</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <h2>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h2>
    <div class="nav-links">
        로그인 | <a href="signup.html">회원가입</a>
    </div>

    <div class="container">
        <form action="#">
            
            <div class="form-group">
                <label>아이디 :</label>
                <input type="text" name="userid" placeholder="아이디 입력" required>
            </div>

            <div class="form-group">
                <label>비밀번호 :</label>
                <input type="password" name="pw" placeholder="비밀번호 입력" required>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-signup">Login</button>
                <button type="reset" class="btn-cancel">Cancel</button>
            </div>

        </form>
    </div>

</body>
</html>

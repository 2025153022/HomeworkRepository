<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 페이지</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <h2>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h2>
    <div class="nav-links">
        <a href="login.html">로그인</a> | 회원가입
    </div>

    <div class="container">
        <form action="#">
            
            <div class="form-group">
                <label>이름 :</label>
                <input type="text" name="name" autofocus>
            </div>

            <div class="form-group">
                <label>생일 :</label>
                <input type="date" name="birth">
            </div>

            <div class="form-group">
                <label>성별 :</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="m"> 남성</label>
                    <label><input type="radio" name="gender" value="f"> 여성</label>
                </div>
            </div>

            <div class="form-group">
                <label>학년 :</label>
                <input type="number" name="grade" min="1" max="4" step="1">
            </div>

            <div class="form-group">
                <label>아이디 :</label>
                <input type="text" name="userid" placeholder="아이디를 입력하세요">
            </div>

            <div class="form-group">
                <label>비밀번호 :</label>
                <input type="password" name="pw" required>
            </div>

            <div class="form-group">
                <label>이메일 :</label>
                <input type="email" name="email" autocomplete="on">
            </div>

            <div class="form-group">
                <label>보안 질문 :</label>
                <select name="question">
                    <option value="">질문을 선택하세요</option>
                    <option value="school">졸업한 초등학교 이름은?</option>
                    <option value="singer">어릴 적 좋아했던 가수는?</option>
                </select>
            </div>

            <div class="form-group">
                <label>답변 :</label>
                <input type="text" name="answer">
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-signup">Signup</button>
                <button type="reset" class="btn-cancel">Cancel</button>
            </div>

        </form>
    </div>

</body>
</html>
